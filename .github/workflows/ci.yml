name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore nocfo.slnx

      - name: Build solution
        run: dotnet build nocfo.slnx --configuration Release --no-restore

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run test suite
        run: dotnet test tests/tests.fsproj --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: tests/TestResults/**/*.trx
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        rid:
          - osx-arm64
          - linux-x64
          - win-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish self-contained binary
        run: dotnet publish tools/tools.fsproj --configuration Release -r ${{ matrix.rid }} --self-contained true -o dist/${{ matrix.rid }}

      - name: Archive publish directory
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          rid="${{ matrix.rid }}"

          if [[ "$rid" == "win-x64" ]]; then
            archive_name="nocfo-${tag}-${rid}.zip"
            (
              cd dist
              zip -r "../${archive_name}" "${rid}"
            )
          else
            archive_name="nocfo-${tag}-${rid}.tar.gz"
            tar -C dist -czf "${archive_name}" "${rid}"
          fi

          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.archive.outputs.archive_name }}
          path: ${{ steps.archive.outputs.archive_name }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: nocfo-*
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi

          gh release upload "$tag" release-assets/* --clobber
